        @keyframes blob {

            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }

        .animation-delay-2000 { animation-delay: 2s; }

        .sao-clip { clip-path: polygon(0 0, 100% 0, 100% calc(100% - 24px), calc(100% - 24px) 100%, 0 100%); }

            0% { top: -10%; }

        .flip-card {

        .flip-card-inner {

            width: 100%;
            height: 100%;

            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }
        .flip-card:hover .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }
        .flip-card-back {

        const BeforeAfterSlider = ({ beforeImage, afterImage, fit = "contain" }) => {
            const [sliderPosition, setSliderPosition] = useState(50);
            const [isDragging, setIsDragging] = useState(false);
            const containerRef = useRef(null);

            const handleMove = (clientX) => {
                if (!containerRef.current) return;
                const rect = containerRef.current.getBoundingClientRect();
                const x = Math.max(0, Math.min(clientX - rect.left, rect.width));
                const percent = (x / rect.width) * 100;
                setSliderPosition(percent);
            };

            const onPointerDown = (e) => {
                setIsDragging(true);
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                handleMove(clientX);
            };

            useEffect(() => {
                const onPointerMove = (e) => {
                    if (!isDragging) return;
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    handleMove(clientX);
                };

                const onPointerUp = () => setIsDragging(false);

                if (isDragging) {
                    window.addEventListener('mousemove', onPointerMove);
                    window.addEventListener('touchmove', onPointerMove, { passive: false });
                    window.addEventListener('mouseup', onPointerUp);
                    window.addEventListener('touchend', onPointerUp);
                }
                return () => {
                    window.removeEventListener('mousemove', onPointerMove);
                    window.removeEventListener('touchmove', onPointerMove);
                    window.removeEventListener('mouseup', onPointerUp);
                    window.removeEventListener('touchend', onPointerUp);
                };
            }, [isDragging]);

            return (
                <div 
                    ref={containerRef}
                    className="relative w-full h-full overflow-hidden select-none touch-none cursor-ew-resize group bg-transparent"
                    onMouseDown={onPointerDown}
                    onTouchStart={onPointerDown}
                >
                    {/* 1. КАРТИНКА "ПОСЛЕ" (Нижний слой - статичный и на весь экран) */}
                    <img 
                        src={afterImage} 
                        alt="ПОСЛЕ" 
                        className={`absolute inset-0 w-full h-full object-${fit} pointer-events-none select-none`} 
                        draggable="false" 
                    />
                    
                    {/* 2. КАРТИНКА "ДО" (Верхний слой - точно такой же, но маскируется ползунком) */}
                    <img 
                        src={beforeImage} 
                        alt="ДО" 
                        className={`absolute inset-0 w-full h-full object-${fit} pointer-events-none select-none`} 
                        style={{ clipPath: `inset(0 ${100 - sliderPosition}% 0 0)` }}
                        draggable="false" 
                    />
                    
                    {/* 3. ЛИНИЯ ПОЛЗУНКА */}
                    <div 
                        className="absolute top-0 bottom-0 w-[2px] bg-orange-500 shadow-[0_0_15px_rgba(249,115,22,1)] z-10 flex items-center justify-center pointer-events-none"
                        style={{ left: `${sliderPosition}%`, transform: 'translateX(-50%)' }}

        function App() {
            const [isLoading, setIsLoading] = useState(true);
            const [loadingText, setLoadingText] = useState('ЗАГРУЗКА.СИСТЕМЫ_');
            const [loadingProgress, setLoadingProgress] = useState(0);

            const [theme, setTheme] = useState(() => {
                if (typeof window !== 'undefined') {
                    return localStorage.getItem('theme') || 'light';
                }
                return 'light';
            });

            const [activeCategory, setActiveCategory] = useState('Все');
            const [selectedProject, setSelectedProject] = useState(null);
            const [currentImageIndex, setCurrentImageIndex] = useState(0);
            const [imageMode, setImageMode] = useState('contain'); 
            
            const [scrolled, setScrolled] = useState(false);
            const [hpLevel, setHpLevel] = useState(0);
            const [catSlide, setCatSlide] = useState(0);

            const mainCategories = CATEGORIES.filter(c => c !== 'Все');

            useEffect(() => {
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
                localStorage.setItem('theme', theme);
            }, [theme]);

            const toggleTheme = () => setTheme(theme === 'light' ? 'dark' : 'light');

            const nextCat = () => setCatSlide(prev => (prev + 1) % mainCategories.length);
            const prevCat = () => setCatSlide(prev => (prev === 0 ? mainCategories.length - 1 : prev - 1));

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                setTimeout(() => setHpLevel(100), 500);
            }, []);

            useEffect(() => {
                setTimeout(() => setLoadingText('ЗАГРУЗКА.МОДУЛЕЙ()'), 600);
                setTimeout(() => setLoadingText('УСТАНОВКА.СВЯЗИ_'), 1200);
                setTimeout(() => setLoadingText('ПОДКЛЮЧЕНИЕ!'), 1900);

                const interval = setInterval(() => {
                    setLoadingProgress(prev => {
                        const newProgress = prev + Math.random() * 18;
                        return newProgress >= 100 ? 100 : newProgress;
                    });
                }, 120);

                setTimeout(() => {
                    setIsLoading(false);
                    clearInterval(interval);
                }, 2500);

                return () => clearInterval(interval);
            }, []);

            const filteredProjects = PROJECTS.filter(project => activeCategory === 'Все' || project.category === activeCategory);

            const openModal = (project, startIndex = 0) => {
                setSelectedProject(project);
                setCurrentImageIndex(startIndex);
                setImageMode('contain');
                document.body.style.overflow = 'hidden';
            };

            const closeModal = () => {
                setSelectedProject(null);
                document.body.style.overflow = 'auto';

                            {/* Выделенный акцентный текст */}
                            <div className="bg-orange-50/80 dark:bg-slate-800/60 border border-orange-200 dark:border-orange-500/30 p-6 md:p-10 sao-clip text-center mb-12 shadow-sm">
                                <p className="text-xl md:text-2xl lg:text-3xl font-bold text-slate-900 dark:text-white tracking-tight leading-snug">
                                    Я&nbsp;привык брать ответственность за&nbsp;макет <br className="hidden md:block"/>от&nbsp;первого эскиза до&nbsp;финального файла в&nbsp;печать.
                                </p>
                            </div>

                            {/* Теги оборудования и навыков */}
                            <div className="pt-8 border-t border-slate-200 dark:border-slate-800">
                                <h3 className="text-sm font-sao tracking-widest text-orange-500 dark:text-orange-400 mb-6 uppercase">Стэк</h3>
                                <div className="flex flex-wrap gap-3">
                                    {['MS Office (Word, Powerpoint, Excel)', 'Adobe Photoshop', 'Adobe Illustrator', 'Figma', 'CorelDraw', 'HTML / CSS', 'JavaScript', 'Tilda / Wix', 'Stable Diffusion (AI)', 'ChatGPT (AI)', 'NanoBanana (AI)', 'Flux (AI)', 'Z-image (AI)'].map((skill, index) => (
                                        <div key={index} className="px-5 py-2 bg-white/80 dark:bg-slate-800 border-l-2 border-orange-200 dark:border-orange-500/50 text-slate-700 dark:text-slate-300 backdrop-blur-md text-sm font-sao tracking-wider hover:border-orange-500 hover:bg-orange-50 dark:hover:bg-slate-700 transition-colors cursor-default shadow-sm">
                                            {skill}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </section>

                    <footer id="contact" className="py-16 px-6 text-center relative z-10 flex justify-center">
                        <div className="max-w-2xl w-full bg-orange-50/80 dark:bg-slate-900/80 backdrop-blur-xl border border-orange-200 dark:border-orange-500/30 p-10 md:p-14 shadow-[0_10px_40px_rgba(249,115,22,0.1)] sao-clip relative">
                            <div className="absolute top-0 left-0 w-full h-8 bg-orange-200/50 dark:bg-orange-900/30 border-b border-orange-200 dark:border-orange-500/30 flex items-center px-4 gap-2">
                                <IconAlertCircle size={14} className="text-orange-600 dark:text-orange-400" />
                                <span className="font-sao text-xs text-orange-600 dark:text-orange-400 tracking-widest uppercase">Системное_сообщение</span>
                            </div>
                            <h2 className="text-3xl font-bold mb-4 tracking-tight mt-6 text-slate-900 dark:text-white">Готов к новым задачам</h2>
                            <p className="text-slate-600 dark:text-slate-400 mb-8 font-light text-lg">Ищете специалиста с&nbsp;опытом в&nbsp;инфобизнесе, веб-дизайне и&nbsp;генеративном AI?</p>
                            <a href="https://t.me/sleeplo_er" target="_blank" rel="noreferrer" className="inline-flex items-center justify-center gap-3 bg-orange-500 text-white px-8 py-4 font-sao font-bold tracking-widest hover:bg-orange-600 transition-all shadow-[0_0_20px_rgba(249,115,22,0.4)] sao-clip group">
                                <IconSend size={18} className="group-hover:-translate-y-1 group-hover:translate-x-1 transition-transform" />
                                ОТПРАВИТЬ ЗАПРОС
                            </a>
                        </div>
                    </footer>

                    {selectedProject && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/95 dark:bg-black/95 backdrop-blur-xl p-0 sm:p-4 md:p-12 transition-all duration-500" onClick={closeModal}>
                            <div className="relative w-full max-w-6xl h-[100dvh] sm:h-full flex flex-col items-center justify-center" onClick={(e) => e.stopPropagation()}>
                                
                                <div className="absolute top-2 left-2 right-2 sm:left-6 sm:right-6 md:top-10 md:left-10 md:right-10 flex justify-between items-start md:items-center z-50 gap-2">
                                    <div className="font-sao text-orange-600 dark:text-orange-400 tracking-widest bg-white/95 dark:bg-slate-900/95 px-3 py-2 md:px-4 md:py-2 border border-orange-300 dark:border-orange-500/30 shadow-md backdrop-blur-md sao-clip text-[10px] md:text-sm max-w-[80%] md:max-w-none text-left">
                                        {selectedProject.isBeforeAfter && selectedProject.beforeAfterImages ? 
                                            `${selectedProject.title.toUpperCase()} // ${currentImageIndex + 1} ИЗ\u00A0${selectedProject.beforeAfterImages.length}` :
                                         selectedProject.images && selectedProject.images.length > 0 ? 
                                            `${selectedProject.title.toUpperCase()} // ${currentImageIndex + 1} ИЗ\u00A0${selectedProject.images.length}` : 
                                            selectedProject.title.toUpperCase()}
                                    </div>
                                    <button className="text-slate-500 shrink-0 dark:text-slate-400 hover:text-white transition-colors p-2 md:p-3 bg-white/95 dark:bg-slate-900/95 hover:bg-red-500 dark:hover:bg-red-600 backdrop-blur-md border border-slate-200 dark:border-slate-700 hover:border-red-500 dark:hover:border-red-600 shadow-md sao-clip group" onClick={closeModal}>
                                        <IconX className="w-5 h-5 md:w-6 md:h-6 group-hover:scale-110 transition-transform" />
                                    </button>
                                </div>

                                <div className="relative w-full h-[75vh] sm:h-[70vh] md:h-[75vh] flex items-center justify-center mt-14 md:mt-0 bg-transparent md:bg-white/50 md:dark:bg-slate-900/50 md:border md:border-slate-200 md:dark:border-slate-800 md:shadow-2xl md:sao-clip-reverse md:backdrop-blur-md overflow-hidden">
                                    <div className="hidden md:block absolute top-0 left-0 w-8 h-8 border-t-2 border-l-2 border-orange-400 dark:border-orange-500 z-40 pointer-events-none"></div>
                                    <div className="hidden md:block absolute bottom-0 right-0 w-8 h-8 border-b-2 border-r-2 border-orange-400 dark:border-orange-500 z-40 pointer-events-none"></div>
                                
                                    {selectedProject.isBeforeAfter && selectedProject.beforeAfterImages && selectedProject.beforeAfterImages.length > 0 ? (
                                        <React.Fragment>
                                            <div className="w-full h-full p-0 md:p-2 pb-10 md:pb-16 relative">
                                                <BeforeAfterSlider 
                                                    key={currentImageIndex}
                                                    beforeImage={selectedProject.beforeAfterImages[currentImageIndex][0]} 
                                                    afterImage={selectedProject.beforeAfterImages[currentImageIndex][1]} 
                                                    fit="contain" 
                                                />
                                            </div>
                                            {selectedProject.beforeAfterImages.length > 1 && (
                                                <React.Fragment>
                                                    <button onClick={(e) => { e.stopPropagation(); setCurrentImageIndex(prev => prev === 0 ? selectedProject.beforeAfterImages.length - 1 : prev - 1); }} className="absolute left-1 md:left-4 top-1/2 -translate-y-1/2 text-orange-600 dark:text-orange-400 p-1.5 md:p-4 bg-white/40 dark:bg-slate-900/40 md:bg-white/80 md:dark:bg-slate-900/80 hover:bg-orange-50 dark:hover:bg-slate-800 shadow-lg backdrop-blur-md transition-all border border-orange-200/50 dark:border-orange-500/30 sao-clip group z-50"><IconChevronLeft className="w-5 h-5 md:w-8 md:h-8 group-hover:-translate-x-1 transition-transform"/></button>
                                                    <button onClick={(e) => { e.stopPropagation(); setCurrentImageIndex(prev => (prev + 1) % selectedProject.beforeAfterImages.length); }} className="absolute right-1 md:right-4 top-1/2 -translate-y-1/2 text-orange-600 dark:text-orange-400 p-1.5 md:p-4 bg-white/40 dark:bg-slate-900/40 md:bg-white/80 md:dark:bg-slate-900/80 hover:bg-orange-50 dark:hover:bg-slate-800 shadow-lg backdrop-blur-md transition-all border border-orange-200/50 dark:border-orange-500/30 sao-clip group z-50"><IconChevronRight className="w-5 h-5 md:w-8 md:h-8 group-hover:translate-x-1 transition-transform"/></button>
                                                    
                                                    <div className="absolute bottom-2 md:bottom-6 left-1/2 -translate-x-1/2 flex flex-wrap justify-center gap-1.5 md:gap-3 z-50 bg-slate-900/60 dark:bg-black/60 backdrop-blur-md px-3 py-1.5 md:px-6 md:py-3 sao-clip border border-white/10 shadow-[0_10px_30px_rgba(0,0,0,0.5)] max-w-[85%]">
                                                        {selectedProject.beforeAfterImages.map((_, i) => (
                                                            <button 
                                                                key={i} 
                                                                onClick={(e) => { e.stopPropagation(); setCurrentImageIndex(i); }}
                                                                className={`w-5 h-1.5 md:w-8 md:h-2.5 transform -skew-x-12 transition-all duration-300 cursor-pointer ${i === currentImageIndex ? 'bg-orange-500 shadow-[0_0_15px_rgba(249,115,22,1)] scale-110' : 'bg-white/40 hover:bg-white/80'}`}
                                                            ></button>
                                                        ))}
                                                    </div>
                                                </React.Fragment>
                                            )}
                                        </React.Fragment>

                                    ) : selectedProject.images && selectedProject.images.length > 0 ? (
                                        <React.Fragment>
                                            {selectedProject.images[currentImageIndex].toLowerCase().endsWith('.pdf') ? (
                                                <div className="w-full h-full flex items-center justify-center p-0 md:p-4 relative">
                                                    <iframe 
                                                        src={`${selectedProject.images[currentImageIndex]}#toolbar=0&navpanes=0&scrollbar=0`} 
                                                        className="w-full h-full border-none shadow-2xl bg-white dark:bg-slate-800"
                                                        title="PDF Просмотр"
                                                    ></iframe>
                                                </div>
                                            ) : (
                                                <React.Fragment>
                                                    {imageMode === 'scroll' ? (
                                                        /* ИСПРАВЛЕНО: Режим скролла. Блок растягивается на всю высоту содержимого, вызывая прокрутку родителя */
                                                        <div className="w-full h-full overflow-y-auto overflow-x-hidden relative custom-scrollbar">
                                                            <div className="w-full flex justify-center pb-16 md:pb-24 pt-2">
                                                                <img 
                                                                    src={selectedProject.images[currentImageIndex]} 
                                                                    alt={selectedProject.title} 
                                                                    onLoad={(e) => {
                                                                        if (selectedProject.isScrollable && e.target.naturalHeight > e.target.naturalWidth * 0.9) {
                                                                            setImageMode('scroll');
                                                                        } else {
                                                                            setImageMode('contain');
                                                                        }
                                                                    }}
                                                                    className="block w-full max-w-4xl h-auto shadow-[0_20px_50px_rgba(0,0,0,0.3)]" 
                                                                    draggable="false"
                                                                />
                                                            </div>
                                                        </div>
                                                    ) : (
                                                        /* Режим центрирования для горизонтальных картинок и мокапов */
                                                        <div className="w-full h-full flex items-center justify-center p-2 pb-10 md:p-8 md:pb-16 relative">
                                                            <img 
                                                                src={selectedProject.images[currentImageIndex]} 
                                                                alt={selectedProject.title} 
                                                                onLoad={(e) => {
                                                                    if (selectedProject.isScrollable && e.target.naturalHeight > e.target.naturalWidth * 0.9) {
                                                                        setImageMode('scroll');
                                                                    } else {
                                                                        setImageMode('contain');
                                                                    }
                                                                }}
                                                                className="max-w-full max-h-full object-contain drop-shadow-2xl" 
                                                                draggable="false"
                                                            />
                                                        </div>
                                                    )}
                                                </React.Fragment>
                                            )}

                                            {selectedProject.images.length > 1 && (
                                                <React.Fragment>
                                                    <button onClick={(e) => { e.stopPropagation(); setCurrentImageIndex(prev => prev === 0 ? selectedProject.images.length - 1 : prev - 1); }} className="absolute left-1 md:left-4 top-1/2 -translate-y-1/2 text-orange-600 dark:text-orange-400 p-1.5 md:p-4 bg-white/40 dark:bg-slate-900/40 md:bg-white/80 md:dark:bg-slate-900/80 hover:bg-orange-50 dark:hover:bg-slate-800 shadow-lg backdrop-blur-md transition-all border border-orange-200/50 dark:border-orange-500/30 sao-clip group z-50"><IconChevronLeft className="w-5 h-5 md:w-8 md:h-8 group-hover:-translate-x-1 transition-transform"/></button>
                                                    <button onClick={(e) => { e.stopPropagation(); setCurrentImageIndex(prev => (prev + 1) % selectedProject.images.length); }} className="absolute right-1 md:right-4 top-1/2 -translate-y-1/2 text-orange-600 dark:text-orange-400 p-1.5 md:p-4 bg-white/40 dark:bg-slate-900/40 md:bg-white/80 md:dark:bg-slate-900/80 hover:bg-orange-50 dark:hover:bg-slate-800 shadow-lg backdrop-blur-md transition-all border border-orange-200/50 dark:border-orange-500/30 sao-clip group z-50"><IconChevronRight className="w-5 h-5 md:w-8 md:h-8 group-hover:translate-x-1 transition-transform"/></button>
                                                    
                                                    <div className="absolute bottom-2 md:bottom-6 left-1/2 -translate-x-1/2 flex flex-wrap justify-center gap-1.5 md:gap-3 z-50 bg-slate-900/60 dark:bg-black/60 backdrop-blur-md px-3 py-1.5 md:px-6 md:py-3 sao-clip border border-white/10 shadow-[0_10px_30px_rgba(0,0,0,0.5)] max-w-[85%]">
                                                        {selectedProject.images.map((_, i) => (
                                                            <button 
                                                                key={i} 
                                                                onClick={(e) => { e.stopPropagation(); setCurrentImageIndex(i); }}
                                                                className={`w-5 h-1.5 md:w-8 md:h-2.5 transform -skew-x-12 transition-all duration-300 cursor-pointer ${i === currentImageIndex ? 'bg-orange-500 shadow-[0_0_15px_rgba(249,115,22,1)] scale-110' : 'bg-white/40 hover:bg-white/80'}`}
                                                            ></button>
                                                        ))}
                                                    </div>
                                                </React.Fragment>
                                            )}
                                        </React.Fragment>
                                    ) : (
                                        <div className="flex flex-col items-center justify-center w-full h-full text-slate-400 p-4 text-center">
                                            <IconAlertCircle className="w-12 h-12 md:w-16 md:h-16 mb-4 text-orange-500/50" />
                                            <span className="font-sao tracking-widest text-sm md:text-lg uppercase text-orange-500/80">[ ИЗОБРАЖЕНИЯ_ОТСУТСТВУЮТ ]</span>
                                        </div>
                                    )}
                                </div>
                                <div className="mt-2 md:mt-8 text-center w-full max-w-2xl px-3 md:px-4 bg-white/90 dark:bg-slate-900/90 shadow-lg backdrop-blur-md py-2 md:py-6 border-l-2 border-r-2 border-orange-400 dark:border-orange-500">
                                    <div className="text-[9px] md:text-xs font-sao tracking-widest text-orange-500 mb-0.5 md:mb-2 uppercase">{selectedProject.category}</div>
                                    <h3 className="text-base md:text-2xl font-bold text-slate-900 dark:text-white mb-0.5 md:mb-3 tracking-tight leading-tight">{selectedProject.title}</h3>
                                    <p className="hidden md:block text-slate-600 dark:text-slate-400 font-sao tracking-wider text-sm md:text-base leading-relaxed">{selectedProject.description}</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
